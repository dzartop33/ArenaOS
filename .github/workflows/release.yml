name: Galaxy OS Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make nasm xorriso mtools

      - name: Download Limine
        run: |
          git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
          make -C limine

      - name: Build Kernel
        run: make kernel.elf

      - name: Create ISO
        run: |
          mkdir -p iso_root
          cp kernel.elf limine.conf limine/limine-bios.sys \
             limine/limine-bios-cd.bin limine/limine-uefi-cd.bin iso_root/
          mkdir -p iso_root/EFI/BOOT
          cp limine/BOOTX64.EFI iso_root/EFI/BOOT/
          xorriso -as mkisofs -b limine-bios-cd.bin \
                  -no-emul-boot -boot-load-size 4 -boot-info-table \
                  --efi-boot limine-uefi-cd.bin \
                  -efi-boot-part --efi-boot-image --protective-msdos-label \
                  iso_root -o ArenaOS-Reality.iso
          ./limine/limine bios-install ArenaOS-Reality.iso

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ArenaOS-Reality.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
