name: Galaxy OS Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make nasm xorriso mtools

      - name: Build Kernel
        run: make kernel.elf

      - name: Create ISO
        run: |
          mkdir -p iso_root
          # Используем актуальное имя файла
          cp kernel.elf iso_root/
          xorriso -as mkisofs -o ArenaOS-Reality.iso iso_root

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ArenaOS-Reality.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
