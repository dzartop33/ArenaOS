name: Build ArenaOS
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Tools
      run: sudo apt-get update && sudo apt-get install -y gcc make xorriso mtools

    - name: Download Limine
      run: |
        git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
        make -C limine

    - name: Build Kernel
      run: make kernel.elf

    - name: Create ISO
      run: |
        mkdir -p iso_root
        
        # 1. Исправляем конфиг: удаляем \r и лишние пробелы
        sed -i 's/\r//g' limine.conf
        cp limine.conf iso_root/limine.conf
        
        # 2. Копируем ядро
        cp kernel.elf iso_root/kernel.elf
        
        # 3. Копируем загрузчик
        cp limine/limine-bios.sys limine/limine-bios-cd.bin limine/limine-uefi-cd.bin iso_root/
        mkdir -p iso_root/EFI/BOOT
        cp limine/BOOTX64.EFI iso_root/EFI/BOOT/
        
        # 4. Сборка с Rock Ridge (-R) и маленькими именами
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                --efi-boot limine-uefi-cd.bin \
                -efi-boot-part --efi-boot-image --protective-msdos-label \
                -R -l -sysid "ARENAOS" iso_root -o ArenaOS.iso
        
        ./limine/limine bios-install ArenaOS.iso

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: ArenaOS-ISO
        path: ArenaOS.iso
