name: Build ArenaOS
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo xorriso mtools nasm

    - name: Download Limine
      run: |
        git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
        make -C limine

    - name: Build Kernel
      run: make kernel.elf

    - name: Create ISO
      run: |
        mkdir -p iso_root/boot/limine
        
        # Создаем конфиг через printf. \n - это четкий перенос строки.
        # ВАЖНО: Никаких пробелов перед двоеточием и PROTOCOL!
        printf "TIMEOUT=5\n\n:ArenaOS\nPROTOCOL=limine\nKERNEL_PATH=boot:///kernel.elf\n" > iso_root/boot/limine/limine.conf
        
        # Копируем конфиг и в корень тоже для подстраховки
        cp iso_root/boot/limine/limine.conf iso_root/limine.conf
        
        # Копируем ядро
        cp kernel.elf iso_root/
        
        # Системные файлы Limine
        cp limine/limine-bios.sys limine/limine-bios-cd.bin limine/limine-uefi-cd.bin iso_root/
        
        # Поддержка UEFI
        mkdir -p iso_root/EFI/BOOT
        cp limine/BOOTX64.EFI iso_root/EFI/BOOT/
        cp limine/BOOTIA32.EFI iso_root/EFI/BOOT/
        
        # Сборка ISO
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                --efi-boot limine-uefi-cd.bin \
                -efi-boot-part --efi-boot-image --protective-msdos-label \
                iso_root -o ArenaOS-Reality.iso
                
        # Прошивка BIOS
        ./limine/limine bios-install ArenaOS-Reality.iso

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: ArenaOS-Reality-ISO
        path: ArenaOS-Reality.iso
