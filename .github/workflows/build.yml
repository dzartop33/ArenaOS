name: Build OS ISO

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo xorriso mtools nasm

    - name: Download Limine
      run: |
        git clone https://github.com/limine-bootloader/limine.git --branch=v5.x-binary --depth=1
        make -C limine

    - name: Build Kernel
      run: make kernel.elf

    - name: Create ISO
      run: |
        mkdir -p iso_root
        cp kernel.elf limine.conf limine/limine-bios.sys \
           limine/limine-bios-cd.bin limine/limine-uefi-cd.bin iso_root/
        mkdir -p iso_root/EFI/BOOT
        cp limine/BOOTX64.EFI iso_root/EFI/BOOT/
        cp limine/BOOTIA32.EFI iso_root/EFI/BOOT/
        xorriso -as mkisofs -b limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                --efi-boot limine-uefi-cd.bin \
                -efi-boot-part --efi-boot-image --protective-msdos-label \
                iso_root -o MyOS.iso
        ./limine/limine bios-install MyOS.iso

    - name: Upload ISO
      uses: actions/upload-artifact@v3
      with:
        name: MyOS-ISO
        path: MyOS.iso
