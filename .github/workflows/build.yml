name: Build ArenaOS
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc make bison flex libgmp3-dev libmpc-dev libmpfr-dev texinfo xorriso mtools nasm

    - name: Download Limine
      run: |
        git clone https://github.com/limine-bootloader/limine.git --branch=v8.x-binary --depth=1
        make -C limine

    - name: Build Kernel
      run: make kernel.elf

    - name: Create ISO
      run: |
        # 1. Создаем структуру папок
        mkdir -p iso_root/boot/limine
        mkdir -p iso_root/EFI/BOOT

        # 2. Копируем ядро в папку /boot/
        cp kernel.elf iso_root/boot/

        # 3. Генерируем конфиг СТРОГО в /boot/limine/limine.conf
        # Мы используем путь boot:///boot/kernel.elf потому что ядро теперь в папке boot
        printf "TIMEOUT=5\n\n:ArenaOS\n    PROTOCOL=limine\n    KERNEL_PATH=boot:///boot/kernel.elf\n" > iso_root/boot/limine/limine.conf

        # 4. Копируем системные файлы загрузчика
        cp limine/limine-bios.sys limine/limine-bios-cd.bin limine/limine-uefi-cd.bin iso_root/boot/limine/
        cp limine/BOOTX64.EFI iso_root/EFI/BOOT/
        cp limine/BOOTIA32.EFI iso_root/EFI/BOOT/

        # 5. Сборка ISO с правильными флагами для Limine 8.x
        xorriso -as mkisofs -b boot/limine/limine-bios-cd.bin \
                -no-emul-boot -boot-load-size 4 -boot-info-table \
                --efi-boot boot/limine/limine-uefi-cd.bin \
                -efi-boot-part --efi-boot-image --protective-msdos-label \
                iso_root -o ArenaOS-Reality.iso

        # 6. Установка BIOS-загрузчика в MBR
        ./limine/limine bios-install ArenaOS-Reality.iso

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: ArenaOS-Reality-ISO
        path: ArenaOS-Reality.iso
